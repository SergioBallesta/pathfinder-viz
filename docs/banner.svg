<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0f0f2e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="30%" stop-color="#00bcd4"/>
      <stop offset="70%" stop-color="#ffd600"/>
      <stop offset="100%" stop-color="#ff1744"/>
    </linearGradient>
    <linearGradient id="pathGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd600" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffab00" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#bg)"/>

  <!-- Grid pattern (left side) -->
  <g opacity="0.15" stroke="#16213e" stroke-width="0.5" fill="none">
    <!-- Vertical lines -->
    <line x1="40" y1="40" x2="40" y2="360"/>
    <line x1="64" y1="40" x2="64" y2="360"/>
    <line x1="88" y1="40" x2="88" y2="360"/>
    <line x1="112" y1="40" x2="112" y2="360"/>
    <line x1="136" y1="40" x2="136" y2="360"/>
    <line x1="160" y1="40" x2="160" y2="360"/>
    <line x1="184" y1="40" x2="184" y2="360"/>
    <line x1="208" y1="40" x2="208" y2="360"/>
    <line x1="232" y1="40" x2="232" y2="360"/>
    <line x1="256" y1="40" x2="256" y2="360"/>
    <line x1="280" y1="40" x2="280" y2="360"/>
    <line x1="304" y1="40" x2="304" y2="360"/>
    <line x1="328" y1="40" x2="328" y2="360"/>
    <line x1="352" y1="40" x2="352" y2="360"/>
    <line x1="376" y1="40" x2="376" y2="360"/>
    <line x1="400" y1="40" x2="400" y2="360"/>
    <!-- Horizontal lines -->
    <line x1="40" y1="40" x2="400" y2="40"/>
    <line x1="40" y1="64" x2="400" y2="64"/>
    <line x1="40" y1="88" x2="400" y2="88"/>
    <line x1="40" y1="112" x2="400" y2="112"/>
    <line x1="40" y1="136" x2="400" y2="136"/>
    <line x1="40" y1="160" x2="400" y2="160"/>
    <line x1="40" y1="184" x2="400" y2="184"/>
    <line x1="40" y1="208" x2="400" y2="208"/>
    <line x1="40" y1="232" x2="400" y2="232"/>
    <line x1="40" y1="256" x2="400" y2="256"/>
    <line x1="40" y1="280" x2="400" y2="280"/>
    <line x1="40" y1="304" x2="400" y2="304"/>
    <line x1="40" y1="328" x2="400" y2="328"/>
    <line x1="40" y1="352" x2="400" y2="352"/>
  </g>

  <!-- Walls on left grid -->
  <g fill="#0f0f0f" opacity="0.9">
    <rect x="112" y="64" width="24" height="24" rx="2"/>
    <rect x="112" y="88" width="24" height="24" rx="2"/>
    <rect x="112" y="112" width="24" height="24" rx="2"/>
    <rect x="136" y="112" width="24" height="24" rx="2"/>
    <rect x="160" y="112" width="24" height="24" rx="2"/>
    <rect x="208" y="160" width="24" height="24" rx="2"/>
    <rect x="208" y="184" width="24" height="24" rx="2"/>
    <rect x="208" y="208" width="24" height="24" rx="2"/>
    <rect x="208" y="232" width="24" height="24" rx="2"/>
    <rect x="232" y="232" width="24" height="24" rx="2"/>
    <rect x="256" y="232" width="24" height="24" rx="2"/>
    <rect x="280" y="160" width="24" height="24" rx="2"/>
    <rect x="280" y="136" width="24" height="24" rx="2"/>
    <rect x="280" y="112" width="24" height="24" rx="2"/>
    <rect x="304" y="112" width="24" height="24" rx="2"/>
    <rect x="136" y="256" width="24" height="24" rx="2"/>
    <rect x="136" y="280" width="24" height="24" rx="2"/>
    <rect x="160" y="280" width="24" height="24" rx="2"/>
    <rect x="304" y="280" width="24" height="24" rx="2"/>
    <rect x="328" y="280" width="24" height="24" rx="2"/>
    <rect x="328" y="256" width="24" height="24" rx="2"/>
    <rect x="328" y="232" width="24" height="24" rx="2"/>
  </g>

  <!-- Explored cells (blue) -->
  <g fill="#1a237e" opacity="0.6">
    <rect x="64" y="88" width="24" height="24" rx="2"/>
    <rect x="64" y="112" width="24" height="24" rx="2"/>
    <rect x="88" y="112" width="24" height="24" rx="2"/>
    <rect x="64" y="136" width="24" height="24" rx="2"/>
    <rect x="88" y="136" width="24" height="24" rx="2"/>
    <rect x="112" y="136" width="24" height="24" rx="2"/>
    <rect x="88" y="160" width="24" height="24" rx="2"/>
    <rect x="112" y="160" width="24" height="24" rx="2"/>
    <rect x="136" y="160" width="24" height="24" rx="2"/>
    <rect x="160" y="160" width="24" height="24" rx="2"/>
    <rect x="184" y="160" width="24" height="24" rx="2"/>
    <rect x="160" y="184" width="24" height="24" rx="2"/>
    <rect x="184" y="184" width="24" height="24" rx="2"/>
    <rect x="160" y="136" width="24" height="24" rx="2"/>
    <rect x="184" y="136" width="24" height="24" rx="2"/>
    <rect x="208" y="136" width="24" height="24" rx="2"/>
    <rect x="232" y="136" width="24" height="24" rx="2"/>
    <rect x="256" y="136" width="24" height="24" rx="2"/>
    <rect x="256" y="160" width="24" height="24" rx="2"/>
    <rect x="232" y="160" width="24" height="24" rx="2"/>
    <rect x="232" y="184" width="24" height="24" rx="2"/>
    <rect x="256" y="184" width="24" height="24" rx="2"/>
    <rect x="256" y="208" width="24" height="24" rx="2"/>
    <rect x="280" y="208" width="24" height="24" rx="2"/>
    <rect x="280" y="184" width="24" height="24" rx="2"/>
    <rect x="304" y="184" width="24" height="24" rx="2"/>
    <rect x="304" y="208" width="24" height="24" rx="2"/>
  </g>

  <!-- Frontier cells (cyan) -->
  <g fill="#00bcd4" opacity="0.4">
    <rect x="64" y="64" width="24" height="24" rx="2"/>
    <rect x="88" y="88" width="24" height="24" rx="2"/>
    <rect x="64" y="160" width="24" height="24" rx="2"/>
    <rect x="136" y="184" width="24" height="24" rx="2"/>
    <rect x="304" y="160" width="24" height="24" rx="2"/>
    <rect x="328" y="184" width="24" height="24" rx="2"/>
    <rect x="328" y="208" width="24" height="24" rx="2"/>
    <rect x="304" y="232" width="24" height="24" rx="2"/>
  </g>

  <!-- Path (yellow) -->
  <g filter="url(#glow)">
    <g fill="#ffd600" opacity="0.95">
      <rect x="88" y="64" width="24" height="24" rx="3"/>
      <rect x="88" y="88" width="22" height="22" rx="3" fill="#ffab00"/>
      <rect x="64" y="64" width="22" height="22" rx="3" fill="#ffab00"/>
      <rect x="64" y="88" width="22" height="22" rx="3" fill="#ffd600"/>
      <rect x="136" y="136" width="24" height="24" rx="3"/>
      <rect x="160" y="160" width="24" height="24" rx="3" fill="#ffab00"/>
      <rect x="184" y="160" width="22" height="22" rx="3" fill="#ffd600"/>
      <rect x="208" y="136" width="24" height="24" rx="3" fill="#ffab00"/>
      <rect x="232" y="136" width="24" height="24" rx="3" fill="#ffd600"/>
      <rect x="256" y="160" width="24" height="24" rx="3"/>
      <rect x="280" y="184" width="24" height="24" rx="3" fill="#ffab00"/>
      <rect x="304" y="208" width="24" height="24" rx="3" fill="#ffd600"/>
      <rect x="328" y="208" width="22" height="22" rx="3" fill="#ffab00"/>
    </g>
  </g>

  <!-- Start node -->
  <g filter="url(#glow)">
    <rect x="64" y="64" width="24" height="24" rx="4" fill="#00e676"/>
    <text x="76" y="80" font-family="monospace" font-size="14" font-weight="bold" fill="#000" text-anchor="middle">S</text>
  </g>

  <!-- End node -->
  <g filter="url(#glow)">
    <rect x="352" y="304" width="24" height="24" rx="4" fill="#ff1744"/>
    <text x="364" y="320" font-family="monospace" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">E</text>
  </g>

  <!-- Right grid pattern (faded) -->
  <g opacity="0.06" stroke="#16213e" stroke-width="0.5" fill="none">
    <line x1="880" y1="40" x2="880" y2="360"/>
    <line x1="904" y1="40" x2="904" y2="360"/>
    <line x1="928" y1="40" x2="928" y2="360"/>
    <line x1="952" y1="40" x2="952" y2="360"/>
    <line x1="976" y1="40" x2="976" y2="360"/>
    <line x1="1000" y1="40" x2="1000" y2="360"/>
    <line x1="1024" y1="40" x2="1024" y2="360"/>
    <line x1="1048" y1="40" x2="1048" y2="360"/>
    <line x1="1072" y1="40" x2="1072" y2="360"/>
    <line x1="1096" y1="40" x2="1096" y2="360"/>
    <line x1="1120" y1="40" x2="1120" y2="360"/>
    <line x1="1144" y1="40" x2="1144" y2="360"/>
    <line x1="1168" y1="40" x2="1168" y2="360"/>
    <line x1="1192" y1="40" x2="1192" y2="360"/>
    <line x1="1216" y1="40" x2="1216" y2="360"/>
    <line x1="1240" y1="40" x2="1240" y2="360"/>
    <line x1="880" y1="40" x2="1240" y2="40"/>
    <line x1="880" y1="64" x2="1240" y2="64"/>
    <line x1="880" y1="88" x2="1240" y2="88"/>
    <line x1="880" y1="112" x2="1240" y2="112"/>
    <line x1="880" y1="136" x2="1240" y2="136"/>
    <line x1="880" y1="160" x2="1240" y2="160"/>
    <line x1="880" y1="184" x2="1240" y2="184"/>
    <line x1="880" y1="208" x2="1240" y2="208"/>
    <line x1="880" y1="232" x2="1240" y2="232"/>
    <line x1="880" y1="256" x2="1240" y2="256"/>
    <line x1="880" y1="280" x2="1240" y2="280"/>
    <line x1="880" y1="304" x2="1240" y2="304"/>
    <line x1="880" y1="328" x2="1240" y2="328"/>
    <line x1="880" y1="352" x2="1240" y2="352"/>
  </g>

  <!-- Title text -->
  <text x="640" y="155" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="62" font-weight="800" fill="url(#titleGrad)" text-anchor="middle" letter-spacing="6" filter="url(#bigGlow)">PATHFINDER</text>

  <!-- Subtitle -->
  <text x="640" y="195" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="16" fill="#555" text-anchor="middle" letter-spacing="8">ALGORITHM VISUALIZER</text>

  <!-- Algo badges -->
  <g font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="13" font-weight="700">
    <!-- A* badge -->
    <rect x="445" y="230" width="100" height="32" rx="6" fill="#111127" stroke="#00e676" stroke-width="1"/>
    <text x="495" y="251" fill="#00e676" text-anchor="middle">A* Search</text>

    <!-- Dijkstra badge -->
    <rect x="565" y="230" width="100" height="32" rx="6" fill="#111127" stroke="#00bcd4" stroke-width="1"/>
    <text x="615" y="251" fill="#00bcd4" text-anchor="middle">Dijkstra</text>

    <!-- BFS badge -->
    <rect x="685" y="230" width="100" height="32" rx="6" fill="#111127" stroke="#ffd600" stroke-width="1"/>
    <text x="735" y="251" fill="#ffd600" text-anchor="middle">BFS</text>
  </g>

  <!-- Tech stack line -->
  <text x="640" y="300" font-family="'JetBrains Mono', monospace" font-size="11" fill="#333" text-anchor="middle" letter-spacing="2">React · TypeScript · Canvas 2D · Vite</text>

  <!-- Decorative dots -->
  <g fill="#00e676" opacity="0.3">
    <circle cx="470" y="340" r="2"/>
    <circle cx="490" y="340" r="2"/>
    <circle cx="510" y="340" r="2"/>
  </g>
  <g fill="#00bcd4" opacity="0.3">
    <circle cx="630" cy="340" r="2"/>
    <circle cx="650" cy="340" r="2"/>
    <circle cx="670" cy="340" r="2"/>
  </g>
  <g fill="#ffd600" opacity="0.3">
    <circle cx="790" cy="340" r="2"/>
    <circle cx="810" cy="340" r="2"/>
    <circle cx="830" cy="340" r="2"/>
  </g>

  <!-- Subtle border -->
