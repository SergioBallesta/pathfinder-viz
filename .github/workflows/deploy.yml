name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
```
---
## Paso 3 — Activar GitHub Pages en Settings
Ve a **Settings → Pages** de tu repo y en *Source* selecciona **"GitHub Actions"** (no "Deploy from a branch").
---
## Paso 4 — Push y listo
Cuando hagas push con esos dos cambios, el workflow se ejecuta automáticamente y en ~1-2 minutos tu app estará en:
```
